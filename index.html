<html lang="pt-BR">
<head>

<title>NexFarm 3D · Sócios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--azul:#0098D5;--ciano:#00CBF7;--navy:#040C22;--white:#fff;--soft:#8CA0BF;--red:#ef4444;--linha:#1E3056}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--navy);color:var(--white);font-family:'Inter',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
  body{background:radial-gradient(1200px 600px at 20% -10%, rgba(0,152,213,.22), transparent 60%), radial-gradient(900px 500px at 90% 0%, rgba(0,203,247,.16), transparent 55%), var(--navy);display:flex;align-items:center;justify-content:center;padding:20px}
  .card{width:100%;max-width:430px;background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.01));border:1px solid rgba(0,203,247,.14);border-radius:26px;padding:42px 34px;backdrop-filter:blur(24px);box-shadow:0 40px 100px rgba(0,0,0,.6)}
  .logo{display:flex;align-items:center;gap:13px;margin-bottom:30px}
  .mark{width:46px;height:46px;border-radius:12px;background:linear-gradient(135deg,var(--azul),var(--ciano));display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk';font-weight:700;color:var(--navy);font-size:24px;box-shadow:0 8px 24px rgba(0,203,247,.35)}
  .name{font-family:'Space Grotesk';font-weight:700;font-size:21px}
  .name span{color:var(--ciano)}
  .lock{display:flex;align-items:center;gap:8px;background:rgba(0,203,247,.08);border:1px solid rgba(0,203,247,.2);padding:10px 14px;border-radius:10px;font-size:12px;color:var(--ciano);margin-bottom:22px}
  h1{font-family:'Space Grotesk';font-weight:700;font-size:23px;margin-bottom:7px}
  p.s{color:var(--soft);font-size:14px;margin-bottom:26px;line-height:1.5}
  label{display:block;font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;font-weight:700}
  input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(0,203,247,.14);border-radius:12px;padding:15px 16px;color:var(--white);font-family:inherit;font-size:15px;margin-bottom:16px;transition:.2s}
  input:focus{outline:none;border-color:var(--ciano);background:rgba(0,203,247,.06);box-shadow:0 0 0 4px rgba(0,203,247,.1)}
  button{width:100%;background:linear-gradient(135deg,var(--azul),var(--ciano));border:none;border-radius:12px;padding:16px;color:var(--navy);font-family:'Space Grotesk';font-weight:700;font-size:15px;cursor:pointer;letter-spacing:.4px;transition:.18s;margin-top:8px;text-transform:uppercase}
  button:hover{transform:translateY(-1px);box-shadow:0 14px 36px rgba(0,203,247,.4)}
  button:disabled{opacity:.6;cursor:wait}
  .err{color:var(--red);font-size:13px;margin-top:14px;min-height:18px}
  .foot{text-align:center;color:#6b7691;font-size:11px;margin-top:26px;text-transform:uppercase;letter-spacing:1.6px}
  .spin{width:14px;height:14px;border:2px solid rgba(0,0,0,.3);border-top-color:var(--navy);border-radius:50%;animation:s .8s linear infinite;display:inline-block}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="card">
    <div class="logo"><div class="mark">N</div><div class="name">NexFarm<span>3D</span></div></div>
    <div class="lock">🔒 Conteúdo criptografado · AES-256-GCM</div>
    <h1>Alinhamento Societário</h1>
    <p class="s">Visão, estrutura e projeções do grupo NexFarm 3D. Acesso restrito aos sócios.</p>
    <form id="f" autocomplete="off">
      <label for="u">Login</label>
      <input type="text" id="u" autocomplete="username" required autofocus />
      <label for="p">Senha</label>
      <input type="password" id="p" autocomplete="current-password" required />
      <button type="submit" id="b">Entrar</button>
      <div class="err" id="err"></div>
    </form>
    <div class="foot">A primeira franquia de Farm 3D do Brasil</div>

  const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(PAYLOAD));
  return new TextDecoder().decode(plain);
}
const f=document.getElementById('f'),b=document.getElementById('b'),err=document.getElementById('err'),pi=document.getElementById('p'),ui=document.getElementById('u');
const SK='nf_socios_v1';
const cached=sessionStorage.getItem(SK);
if(cached) unlock(cached);
f.addEventListener('submit',async e=>{e.preventDefault();
  if(ui.value.trim().toLowerCase()!==USER){err.textContent='Login incorreto.';return;}
  await unlock(pi.value);});
async function unlock(pw){
  err.textContent='';b.disabled=true;b.innerHTML='<span class="spin"></span>';
  try{const html=await decrypt(pw);sessionStorage.setItem(SK,pw);document.open();document.write(html);document.close();}
  catch(e){sessionStorage.removeItem(SK);b.disabled=false;b.textContent='Entrar';err.textContent='Senha incorreta.';pi.select();}
}
